<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 어드벤처 게임 - 메인</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/game.css">
</head>
<body>
    <div id="container">
        <div class="header">
            <div id="status">
                <div id="lives"></div>
                <div id="mental"></div>
                <div id="money"></div>
                <div id="found_treasures"></div>
            </div>
        </div>
        <div class="story-text" id="story-text"></div>
        <div class="bar">
            <div id="choices"></div>
            <button id="reset-button">
                <img src="/static/image/초기화.svg" alt="초기화">
            </button>
            <div class="box"></div>
        </div>
    </div>
    <div class="item-list">
        <h3>Items:</h3>
        <ul id="items">
            <!-- 아이템 목록이 여기에 표시됩니다 -->
        </ul>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
